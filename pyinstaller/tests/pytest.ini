[pytest]
minversion = 7.0
addopts = -ra -q --strict-markers
testpaths = .
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    e2e: marks tests as end-to-end tests
    slow: marks tests as slow (deselect with '-m "not slow"')
    phase1: Environment setup and validation
    phase2: Pi installation and validation
    phase3: Honcho-pi installation
    phase4: Service startup and health
    phase5: Memory E2E validation
    phase6: Pi extension validation
    docker: marks tests requiring Docker